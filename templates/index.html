<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar Licitações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      function toggleDarkMode() {
        document.documentElement.classList.toggle('dark');
      }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        /* Espaçamento entre textos das tags <p> dentro dos cards */
        .card p {
            margin-bottom: 0.5em;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem; /* 24px */
        }
        .card-wrapper {
            background-color: #ffffff;
            border-radius: 0.5rem; /* 8px */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 1.5rem; /* 24px */
            border-bottom: 4px solid #61B1DE; /* azul e-mail */
            word-wrap: break-word; /* Para quebra de texto longo */
        }
        .caixa-escolar {
            color: #e57373; /* vermelho suave */
            font-weight: bold;
        }
        .data-ate {
            color: #388e3c; /* verde suave */
            font-style: italic;
        }
        .search-form {
            background-color: #ffffff;
            padding: 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
        /* Dark mode styles */
        html.dark body {
            background-color: #111827;
        }
        html.dark .search-form {
            background-color: #1f2937;
            color: #f3f4f6;
        }
        html.dark .card-wrapper {
            background-color: #1f2937;
            color: #f3f4f6;
            border-bottom: 4px solid #2563eb;
        }
        html.dark h1, html.dark h2 {
            color: #f3f4f6 !important;
        }
        html.dark .text-gray-900,
        html.dark .text-gray-800,
        html.dark .text-gray-600 {
            color: #f3f4f6 !important;
        }
        html.dark .caixa-escolar {
            color: #ef5350;
        }
        html.dark .data-ate {
            color: #4ade80;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 p-4 sm:p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl sm:text-4xl font-extrabold text-center text-gray-900 dark:text-gray-100 mb-8 mt-4">
            Pesquisador de Licitações (SRE Varginha)
        </h1>
        <div class="flex justify-center mb-4">
            <button onclick="toggleDarkMode()" class="px-4 py-2 bg-gray-800 text-white rounded hover:bg-gray-700 dark:bg-gray-200 dark:text-gray-900 transition">
                Alternar tema
            </button>
        </div>
        <div class="search-form">
            <form method="POST" action="/" class="flex flex-col sm:flex-row gap-4 items-center">
                <input
                    type="text"
                    name="search_query"
                    placeholder="Digite a palavra-chave para buscar na especificação..."
                    value="{{ search_query }}"
                    class="flex-1 p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-auto dark:bg-gray-800 dark:text-gray-100"
                />
                <select name="max_pages" class="p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-gray-100">
                    {% for i in range(1, 16) %}
                        {% set value = i * 9 %}
                        {% set label = i * 6 %}
                        <option value="{{ value }}" {% if value == 9 %}selected{% endif %}>{{ label }} últimas publicações</option>
                    {% endfor %}
                </select>
                <button
                    type="submit"
                    class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 w-full sm:w-auto transition duration-300 ease-in-out dark:bg-blue-800"
                >
                    Pesquisar
                </button>
            </form>
        </div>

        {% if cards %}
            <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6 text-center">Resultados da Pesquisa</h2>
            <div class="card-grid">
                {% for card in cards %}
                    <div class="card-wrapper">
                        {{ card.full_html_content | safe }}
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="text-center text-gray-600 dark:text-gray-400 text-lg mt-8">Nenhum card encontrado para a sua pesquisa ou a página ainda não foi carregada.</p>
        {% endif %}
    </div>
</body>
</html>
