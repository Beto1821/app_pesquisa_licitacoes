<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar Licitações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem; /* 24px */
        }
        /* Ajustes básicos para o card, os estilos originais do site podem sobrepor */
        .card-wrapper {
            background-color: #ffffff;
            border-radius: 0.5rem; /* 8px */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 1.5rem; /* 24px */
            border-bottom: 4px solid #61B1DE; /* azul e-mail */
            word-wrap: break-word; /* Para quebra de texto longo */
        }
        .caixa-escolar {
            color: #e57373; /* vermelho suave */
            font-weight: bold;
        }
        .data-ate {
            color: #388e3c; /* verde suave */
            font-style: italic;
        }

        /* Os estilos abaixo são apenas para a barra de pesquisa e o layout geral,
           o conteúdo dos cards será renderizado com seus estilos originais do site. */
        .search-form {
            background-color: #ffffff;
            padding: 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 sm:p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl sm:text-4xl font-extrabold text-center text-gray-900 mb-8 mt-4">
            Pesquisador de Licitações (SRE Varginha)
        </h1>

        <div class="search-form">
            <form method="POST" action="/" class="flex flex-col sm:flex-row gap-4 items-center">
                <input
                    type="text"
                    name="search_query"
                    placeholder="Digite a palavra-chave para buscar na especificação..."
                    value="{{ search_query }}"
                    class="flex-1 p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-auto"
                />
                <select name="max_pages" class="p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    {% for n in range(1, 16) %}
                        <option value="{{ n }}" {% if n == 9 %}selected{% endif %}>{{ n }} páginas</option>
                    {% endfor %}
                </select>
                <button
                    type="submit"
                    class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 w-full sm:w-auto transition duration-300 ease-in-out"
                >
                    Pesquisar
                </button>
            </form>
        </div>

        {% if cards %}
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Resultados da Pesquisa</h2>
            <div class="card-grid">
                {% for card in cards %}
                    <div class="card-wrapper">
                        <!-- Renderiza o HTML completo do card original -->
                        {{ card.full_html_content | safe }}
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="text-center text-gray-600 text-lg mt-8">Nenhum card encontrado para a sua pesquisa ou a página ainda não foi carregada.</p>
        {% endif %}
    </div>
</body>
</html>
